services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: base
    container_name: joblin-dev-api
    command: npm run start:dev:poll
    env_file:
      - ./apps/api/.env
    environment:
      - PORT=3001
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/home/node/app
    networks:
      - primary
    depends_on:
      - postgresdb

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: base
    container_name: joblin-dev-frontend
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    volumes:
      - ./apps/frontend/src:/home/node/app/src
      - ./apps/frontend/static:/home/node/app/static
      - ./apps/frontend/vite.config.ts:/home/node/app/vite.config.ts:ro
      - ./apps/frontend/svelte.config.js:/home/node/app/svelte.config.js:ro
    networks:
      - primary

  postgresdb:
    image: postgres:16-alpine
    container_name: joblin-db
    env_file:
      - ./apps/api/.env
    ports:
      - "5432:5432"
    expose:
      - "5432"
    volumes:
      - "./.volumes/postgresql:/var/lib/postgresql"
    networks:
      - primary

volumes:
  pgdata:

networks:
  primary:
    driver: bridge
